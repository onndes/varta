<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/shield-x256.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Система автоматичного розподілу нарядів VARTA-2026" />
    <meta name="theme-color" content="#6c757d" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/shield-x512.png" />
    <title>VARTA-2026 Система нарядів</title>
    <!--
      Inline theme script: runs synchronously in <head> before any paint.
      Sets data-bs-theme on <html> so both Bootstrap AND our CSS vars
      (scoped to html[data-bs-theme="dark"]) are active before first render.
    -->
    <script>
      (function () {
        if (localStorage.getItem('varta-theme') === 'dark') {
          document.documentElement.setAttribute('data-bs-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
